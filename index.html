<!DOCTYPE html>

<html>

	<head>

		<title>Racing Manager Clicker</title>
		<link rel="stylesheet" href="style.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
		<link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.4/themes/smoothness/jquery-ui.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.4/jquery-ui.min.js"></script>
		<link href='http://fonts.googleapis.com/css?family=Trade+Winds|Quantico:400,700italic|Audiowide' rel='stylesheet' type='text/css'>

	</head>

	<body>

		<div class="container">

			<div class="game-module" id="stats">

				<div class ="value" id="money">0</div>
				<div class="value" id="driver-level">0</div>
				<div class="value" id="car-level">0</div>
				<div class="value" id="race-level">0</div>
				
			</div>

			<div class="game-module" id="main">

				<div class="race-module">
					<div class="race-car">
						Drag <br />
						Car <br />
						Here
					</div>
					<div class="race-progress">
						<span class="progress-bar"></span>
						<span class="progress-count">0:05<br /> Remaining</span>
					</div>
					<div class="race-button-container">
						<div class="race-button race-start"></div>
						<div class="race-button race-upgrade"></div>
					</div>
					<div class="race-description">
						<span class="race-title">Race Type</span><br />
						<span>This is a type of race. In this type of race it
						is important to have a fast car!</span>
					</div>
				</div>

				<div class="race-module">
					<div class="race-car">
						Drag <br />
						Car <br />
						Here
					</div>
					<div class="race-progress">
						<span class="progress-bar"></span>
						<span class="progress-count">0:05<br /> Remaining</span>
					</div>
					<div class="race-button-container">
						<div class="race-button race-start"></div>
						<div class="race-button race-upgrade"></div>
					</div>
					<div class="race-description">
						<span class="race-title">Race Type</span><br />
						<span>This is a type of race. In this type of race it
						is important to have a fast car!</span>
					</div>
				</div>

			</div>

			<div class="game-module">
				<div class="car-container">
					<div class="garage-car">
						+
					</div>
					<div class="garage-car">
						+
					</div>
					<div class="garage-car">
						+
					</div>
					<div class="garage-car">
						+
					</div>
				</div>
				
				<div class="upgrade-container">
					<div class="upgrade-name">Engine</div>
					<div class="upgrade-progress"></div>
				</div>
			</div>

		</div>

		<script src="script.js"></script>

	</body>

</html>
